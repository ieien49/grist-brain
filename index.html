<!DOCTYPE html>
<html lang="fr">
<head>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Cerveau</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f7;
  --s1:#ffffff;
  --s2:#f1f0ef;
  --s3:#e8e7e5;
  --s4:#dddcda;
  --b1:#e8e7e5;
  --b2:#d5d4d2;
  --b3:#c0bfbc;
  --t1:#1a1a1a;
  --t2:#666560;
  --t3:#999693;
  --t4:#c0bfbc;
  --r:10px;
  --rsm:6px;
  --f:'DM Sans',system-ui,sans-serif;
  --fm:'DM Mono',monospace;
  --crit:#e03131;
  --high:#e67700;
  --med:#3b82f6;
  --low:#6b7280;
  --cweb:#0ca678;
  --cfile:#8b5cf6;
  --cnote:#f59e0b;
  --cact:#3b82f6;
}
html,body{height:100%;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5}

/* ── LAYOUT ─────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────── */
#sidebar{
  width:210px;min-width:210px;
  background:var(--s1);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  padding:14px 0;overflow-y:auto;
  flex-shrink:0;
}
.sb-logo{
  padding:2px 16px 18px;
  display:flex;align-items:center;gap:9px;
  font-size:13px;font-weight:600;letter-spacing:-.3px;color:var(--t1);
}
.sb-section{margin-bottom:4px}
.sb-lbl{
  padding:3px 16px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;color:var(--t4);margin-bottom:1px;
}
.sb-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;cursor:pointer;color:var(--t2);
  font-size:12.5px;transition:all .12s;position:relative;user-select:none;
}
.sb-item:hover{color:var(--t1);background:var(--s2)}
.sb-item.active{color:var(--t1);background:var(--s3);font-weight:500}
.sb-item.active::before{
  content:'';position:absolute;left:0;top:5px;bottom:5px;
  width:2px;background:var(--t1);border-radius:0 2px 2px 0;
}
.sb-item .cnt{
  margin-left:auto;font-size:10px;font-family:var(--fm);
  color:var(--t3);background:var(--s3);padding:1px 5px;border-radius:10px;
}
.sb-div{border:none;border-top:1px solid var(--b1);margin:6px 0}
.sb-cat{
  display:flex;align-items:center;gap:7px;
  padding:5px 16px 5px 22px;cursor:pointer;
  color:var(--t2);font-size:12px;transition:all .12s;
}
.sb-cat:hover{color:var(--t1);background:var(--s2)}
.sb-cat.active{color:var(--t1);font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── MAIN ─────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ──────────────────────────────────── */
#topbar{
  border-bottom:1px solid var(--b1);padding:0 20px;
  display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0;
  background:var(--s1);
}
.tb-title{font-size:14px;font-weight:600;letter-spacing:-.3px;color:var(--t1);flex:1}
.seg{
  display:flex;background:var(--s2);border:1px solid var(--b1);
  border-radius:8px;padding:2px;gap:2px;
}
.seg-b{
  padding:4px 12px;border-radius:6px;font:500 11.5px var(--f);
  cursor:pointer;border:none;background:transparent;color:var(--t3);transition:all .15s;
}
.seg-b.active{background:var(--s4);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.flt{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border:1px solid var(--b2);border-radius:20px;
  background:transparent;color:var(--t2);font:12px var(--f);cursor:pointer;transition:all .12s;
}
.flt select{background:transparent;border:none;color:inherit;font:inherit;cursor:pointer;outline:none;padding:0;-webkit-appearance:none}
.flt:hover{border-color:var(--b3);color:var(--t1)}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:var(--rsm);
  font:500 12px var(--f);cursor:pointer;transition:all .12s;border:none;white-space:nowrap;
}
.btn-p{background:var(--t1);color:var(--bg)}
.btn-p:hover{opacity:.85}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--b2)}
.btn-g:hover{color:var(--t1);border-color:var(--b3);background:var(--s2)}
.ibt{
  width:25px;height:25px;border-radius:5px;background:var(--s3);
  border:1px solid var(--b2);color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.ibt:hover{color:var(--t1);background:var(--s2)}

/* ── CONTENT AREA ────────────────────────────── */
#content{flex:1;overflow-y:auto;padding:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}

/* ── DASHBOARD LAYOUT ────────────────────────── */
#dashboard{
  display:grid;grid-template-columns:1fr 380px;
  height:100%;overflow:hidden;
}
.dash-panel{
  display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid var(--b1);
}
.dash-panel:last-child{border-right:none}
.panel-header{
  display:flex;align-items:center;gap:8px;
  padding:14px 18px 12px;border-bottom:1px solid var(--b1);
  flex-shrink:0;
}
.panel-title{font-size:12.5px;font-weight:600;color:var(--t1);flex:1}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px}

/* ── STATS ROW ───────────────────────────────── */
.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:0;
}
.stat-c{
  background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r);padding:12px 14px;
}
.stat-v{
  font-size:22px;font-weight:700;font-family:var(--fm);
  color:var(--t1);line-height:1;margin-bottom:3px;
}
.stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}

/* ── KNOWLEDGE CARDS ─────────────────────────── */
.k-group{margin-bottom:0}
.g-hdr{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;background:var(--s2);border-bottom:1px solid var(--b1);
  position:sticky;top:0;z-index:1;
}
.g-title{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.g-badge{font-size:10px;font-family:var(--fm);color:var(--t3);background:var(--s3);padding:1px 5px;border-radius:8px;}
.tag{font-size:10px;padding:2px 6px;border-radius:8px;background:var(--s3);color:var(--t3);font-family:var(--fm);white-space:nowrap;}
/* TABLE */
.ktable{width:100%;border-collapse:collapse;table-layout:fixed;}
.ktable th{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  color:var(--t3);padding:7px 14px;text-align:left;
  background:var(--s2);border-bottom:1px solid var(--b1);
  position:sticky;top:0;
}
.ktable td{
  padding:7px 14px;border-bottom:1px solid var(--b1);
  font-size:12.5px;color:var(--t1);vertical-align:middle;
}
.krow{cursor:pointer;transition:background .1s;}
.krow:hover{background:var(--s2);}
.krow:hover .row-acts{display:flex;}
.krow:last-child td{border-bottom:none;}
.row-acts{display:none;align-items:center;gap:3px;}
.type-pill{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:6px;flex-shrink:0;
}
.type-pill.tweb{background:var(--s3);color:var(--t3);}
.type-pill.tfich{background:var(--s3);color:var(--t3);}
.type-pill.tnote{background:var(--s3);color:var(--t3);}
/* Search bar */
.search-wrap{
  display:flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--b2);border-radius:20px;
  padding:4px 10px;transition:border-color .15s;min-width:180px;
}
.search-wrap:focus-within{border-color:var(--b3);}
.search-wrap input{
  background:transparent;border:none;outline:none;
  font:12.5px var(--f);color:var(--t1);width:100%;
}
.search-wrap input::placeholder{color:var(--t3);}
.search-clear{
  background:none;border:none;cursor:pointer;
  color:var(--t3);padding:0;display:flex;align-items:center;
  transition:color .12s;flex-shrink:0;
}
.search-clear:hover{color:var(--t2);}
/* Viewer popup */
.viewer-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  backdrop-filter:blur(4px);display:flex;align-items:center;
  justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;
}
.viewer-ov.open{opacity:1;pointer-events:all;}
.viewer{
  background:var(--s1);border:1px solid var(--b2);border-radius:13px;
  width:520px;max-width:calc(100vw - 24px);max-height:calc(100vh - 60px);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
  transform:translateY(12px) scale(.97);transition:transform .2s;
}
.viewer-ov.open .viewer{transform:translateY(0) scale(1);}
.viewer-hdr{
  padding:16px 18px 14px;border-bottom:1px solid var(--b1);
  display:flex;align-items:flex-start;gap:10px;
}
.viewer-ico{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.viewer-ico.tweb{background:var(--s3);color:var(--t3);}
.viewer-ico.tfich{background:var(--s3);color:var(--t3);}
.viewer-ico.tnote{background:var(--s3);color:var(--t3);}
.viewer-title{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3;flex:1;}
.viewer-body{padding:16px 18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px;}
.viewer-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.viewer-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--s2);border:1px solid var(--b1);color:var(--t2);}
.viewer-desc{font-size:13px;color:var(--t1);line-height:1.7;white-space:pre-wrap;}
.viewer-foot{
  padding:12px 18px;border-top:1px solid var(--b1);
  display:flex;gap:7px;justify-content:flex-end;
}
.col-name{width:35%}
.col-type{width:36px;padding-right:2px!important}
.col-dos{width:18%}
.col-tags{width:20%}
.col-desc{width:auto}
.col-act{width:68px;text-align:right}

/* ── TASKS ───────────────────────────────────── */
.t-section{margin-bottom:20px}
.ts-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px;padding:0 2px}
.ts-title{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3)}
.ts-cnt{font-size:10px;font-family:var(--fm);color:var(--t3)}
.trow{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:var(--rsm);
  border:1px solid transparent;cursor:pointer;
  transition:all .12s;margin-bottom:2px;background:var(--s2);
}
.trow:hover{background:var(--s3);border-color:var(--b1)}
.tchk{
  width:15px;height:15px;border-radius:3px;border:1.5px solid var(--b3);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .15s;cursor:pointer;background:transparent;
}
.tchk:hover{border-color:var(--t3)}
.tchk.done{background:#6b7280;border-color:#6b7280}
.tname{flex:1;font-size:12.5px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tname.done{text-decoration:line-through;color:var(--t3)}
.prio{font-size:10px;font-weight:500;padding:2px 6px;border-radius:8px;flex-shrink:0;font-family:var(--fm)}
.pc{background:rgba(240,82,82,.12);color:var(--crit)}
.ph{background:rgba(245,158,11,.12);color:var(--high)}
.pm{background:rgba(59,130,246,.12);color:var(--med)}
.pl{background:rgba(107,114,128,.12);color:var(--low)}
.tdate{font-size:10.5px;color:var(--t3);font-family:var(--fm);flex-shrink:0}
.tdate.ov{color:var(--crit)}
.tdate.sn{color:var(--high)}
.t-acts{display:none;gap:3px}
.trow:hover .t-acts{display:flex}

/* ── QUICK ADD (tasks) ───────────────────────── */
.quick-add{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:var(--s2);
  border:1px dashed var(--b2);border-radius:var(--rsm);
  cursor:pointer;color:var(--t3);font-size:12px;
  transition:all .15s;margin-bottom:12px;
}
.quick-add:hover{border-color:var(--b3);color:var(--t2);background:var(--s3)}
.quick-add input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--t1);font:13px var(--f);
}
.quick-add input::placeholder{color:var(--t3)}

/* ── FULL VIEWS ──────────────────────────────── */
#view-knowledge,#view-tasks{
  flex:1;overflow-y:auto;padding:20px;
}

/* ── EMPTY ───────────────────────────────────── */
.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 30px;color:var(--t3);
  text-align:center;gap:10px;
}
.empty svg{opacity:.25}
.empty p{font-size:12px;max-width:250px;line-height:1.6}

/* ── MODAL ───────────────────────────────────── */
.ov{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(5px);display:flex;align-items:center;
  justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;
}
.ov.open{opacity:1;pointer-events:all}
.modal{
  background:var(--s2);border:1px solid var(--b2);border-radius:13px;
  width:460px;max-width:calc(100vw - 24px);max-height:calc(100vh - 60px);
  display:flex;flex-direction:column;
  box-shadow:0 24px 60px rgba(0,0,0,.7);
  transform:translateY(14px) scale(.97);transition:transform .2s;overflow:hidden;
}
.ov.open .modal{transform:translateY(0) scale(1)}
.m-hdr{
  padding:18px 18px 14px;border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;
}
.m-title{font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:9px}
.m-body{padding:18px;overflow-y:auto;flex:1}
.m-foot{
  padding:12px 18px;border-top:1px solid var(--b1);
  display:flex;gap:7px;justify-content:flex-end;
}
.fg{margin-bottom:14px}
.fl{
  display:block;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:5px;
}
.fi,.fs,.fta{
  width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:var(--rsm);
  color:var(--t1);font:13px var(--f);padding:8px 11px;outline:none;transition:border-color .15s;-webkit-appearance:none;
}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--b3)}
.fs option{background:var(--s3)}
.fta{resize:vertical;min-height:80px;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-sel{display:flex;gap:5px}
.topt{
  flex:1;padding:7px 8px;border-radius:var(--rsm);border:1px solid var(--b2);
  background:transparent;color:var(--t2);font:12px var(--f);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s;
}
.topt:hover{border-color:var(--b3);color:var(--t1)}
.topt.active{border-color:var(--t1);background:var(--s3);color:var(--t1);font-weight:500}

/* ── TOAST ───────────────────────────────────── */
.toast{
  position:fixed;bottom:18px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--s4);border:1px solid var(--b2);border-radius:8px;
  padding:9px 16px;font-size:12px;color:var(--t1);z-index:2000;
  opacity:0;transition:all .25s;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.5);display:flex;align-items:center;gap:7px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING ─────────────────────────────────── */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:12px;gap:9px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:15px;height:15px;border:2px solid var(--b2);border-top-color:var(--b3);border-radius:50%;animation:spin .8s linear infinite}

/* ── PROGRESS BAR ────────────────────────────── */
.progress-wrap{margin-top:8px}
.progress-lbl{display:flex;justify-content:space-between;font-size:10.5px;color:var(--t3);margin-bottom:4px}
.progress-bar{height:4px;background:var(--b2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#0ca678);border-radius:2px;transition:width .4s}

/* ── MINI SECTION (knowledge panel in dashboard) ── */
.mini-type-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.cat-tag{
  display:inline-block;font-size:10.5px;font-weight:500;
  padding:2px 8px;border-radius:20px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;
}
/* Sidebar sub-folders */
.sb-folders-sub{overflow:hidden;transition:max-height .2s ease;max-height:0;}
.sb-folders-sub.open{max-height:600px;}
.sb-subfolder{
  display:flex;align-items:center;gap:7px;
  padding:5px 14px 5px 30px;cursor:pointer;
  color:var(--t2);font-size:12px;transition:all .12s;
}
.sb-subfolder:hover{color:var(--t1);background:var(--s2)}
.sb-subfolder.active{color:var(--t1);font-weight:500;background:var(--s2)}
.sb-cat-chevron{
  margin-left:auto;transition:transform .2s;flex-shrink:0;
  color:var(--t3);
}
.sb-cat-chevron.open{transform:rotate(90deg)}
.mtt{
  padding:3px 9px;border-radius:10px;font-size:11px;font-family:var(--fm);
  cursor:pointer;border:1px solid var(--b2);color:var(--t3);background:transparent;transition:all .12s;
}
.mtt:hover{color:var(--t2);border-color:var(--b3)}
.mtt.active{color:var(--t1);border-color:var(--t1);background:var(--s3)}
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sb-logo">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.44-4.54z"/>
        <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.44-4.54z"/>
      </svg>
      Second Cerveau
    </div>

    <div class="sb-section">
      <div class="sb-lbl">Vues</div>
      <div class="sb-item active" data-view="dashboard" onclick="switchView('dashboard')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sb-item" data-view="knowledge" onclick="switchView('knowledge')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        Connaissances
        <span class="cnt" id="cnt-k">0</span>
      </div>
      <div class="sb-item" data-view="tasks" onclick="switchView('tasks')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Tâches
        <span class="cnt" id="cnt-t">0</span>
      </div>
    </div>

    <hr class="sb-div">
    <div id="sb-dynamic"></div>


  </nav>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="tb-title" id="tb-title">Dashboard</div>
      <div id="tb-filters" style="display:flex;align-items:center;gap:6px"></div>
      <button class="btn btn-p" id="btn-add" onclick="openAddModal()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter
      </button>
    </div>
    <div id="content">
      <div class="loading"><div class="spinner"></div>Connexion à Grist…</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="ov" id="ov" onclick="handleOvClick(event)">
  <div class="modal">
    <div class="m-hdr">
      <div class="m-title" id="m-title">Nouvel élément</div>
      <button class="ibt" onclick="closeModal()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="m-body" id="m-body"></div>
    <div class="m-foot">
      <button class="btn btn-g" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" onclick="saveModal()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- VIEWER -->
<div class="viewer-ov" id="viewer-ov" onclick="handleViewerOvClick(event)">
  <div class="viewer">
    <div class="viewer-hdr">
      <div class="viewer-ico" id="viewer-ico"></div>
      <div style="flex:1;min-width:0">
        <div class="viewer-title" id="viewer-title"></div>
        <div id="viewer-subtitle" style="font-size:11.5px;color:var(--t2);margin-top:3px"></div>
      </div>
      <button class="ibt" onclick="closeViewer()" style="flex-shrink:0">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="viewer-body" id="viewer-body"></div>
    <div class="viewer-foot">
      <button class="btn btn-g" onclick="closeViewer()">Fermer</button>
      <button class="btn btn-p" id="viewer-edit-btn" onclick="">Modifier</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Enregistré</span>
</div>

<script>
/* STATE */
const S={view:'dashboard',items:[],dossiers:[],cats:[],fType:'all',fDossier:'all',fCat:'all',fPrio:'all',fSearch:'',groupBy:'dossier',dashKType:'all',modalMode:null,editId:null,mType:'note',expandedCat:null};
let gReady=false;

/* ICONS */
const IC={
  web:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  fichier:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  note:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  action:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
  folder:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  check:`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`,
  edit:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  link:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
  plus:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
};
const TCOL={web:'#10b981',fichier:'#8b5cf6',note:'#f59e0b',action:'#3b82f6'};
const PORD={Critique:0,Haute:1,Moyenne:2,Basse:3};

/* HELPERS — définis en premier, avant tout le reste */
function getDos(ref){ return S.dossiers.find(d=>d.id===ref||d.nom===ref)||null; }
function getCat(ref){ return S.cats.find(c=>c.id===ref||c.nom===ref)||null; }
function dosName(ref){ const d=getDos(ref); return d?d.nom:''; }
function dosCatCol(ref){ const d=getDos(ref); if(!d) return '#444'; const c=getCat(d.categorie); return c?c.couleur||'#444':'#444'; }
function fmtDate(v){ if(!v) return ''; const d=new Date(typeof v==='number'?v*1000:v); if(isNaN(d)) return ''; return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}); }
function dcls(v){ if(!v) return ''; const d=new Date(typeof v==='number'?v*1000:v); if(isNaN(d)) return ''; const diff=(d-new Date())/864e5; return diff<0?'ov':diff<3?'sn':''; }
function pcls(p){ return {'Critique':'pc','Haute':'ph','Moyenne':'pm','Basse':'pl'}[p]||'pl'; }
function eh(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s){ return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toast-msg').textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
function t2r(raw){ if(!raw||!raw.id) return []; return raw.id.map((id,i)=>{ const r={id}; Object.keys(raw).forEach(k=>{ r[k]=raw[k][i]; }); return r; }); }

/* GRIST INIT */
let TI='Item', TD='Dossier', TC='Categorie';

grist.ready({ requiredAccess:'full' });

grist.onOptions(function(opts){
  if(opts&&opts.tableItem)    TI=opts.tableItem;
  if(opts&&opts.tableDossier) TD=opts.tableDossier;
  if(opts&&opts.tableCat)     TC=opts.tableCat;
  loadAll();
});

// Fallback si onOptions n'est pas appelé (Grist self-hosted)
setTimeout(function(){ if(!gReady) loadAll(); }, 2000);

grist.onRecords(function(){ if(gReady) loadAll(); });

async function loadAll(){
  try{
    const [ir,dr,cr]=await Promise.all([
      grist.docApi.fetchTable(TI),
      grist.docApi.fetchTable(TD),
      grist.docApi.fetchTable(TC),
    ]);
    S.cats=t2r(cr); S.dossiers=t2r(dr); S.items=t2r(ir);
    gReady=true; renderAll();
  }catch(e){
    console.error('Grist loadAll error:',e);
    const msg=String(e&&e.message?e.message:e);
    let hint='';
    if(msg.includes('KeyError')||msg.includes('Unknown table')||msg.includes('not found')){
      hint=`Tables introuvables (essayé&nbsp;: <b>${TI}</b>, <b>${TD}</b>, <b>${TC}</b>).<br>
        Vérifiez les noms exacts dans Grist → <em>Données sources</em> (sensible à la casse).<br><br>
        <div style="display:flex;flex-direction:column;gap:8px;max-width:300px;margin:12px auto 0">
          <div><label class="fl">Table items</label><input class="fi" id="cfg-item" value="${TI}"></div>
          <div><label class="fl">Table dossiers</label><input class="fi" id="cfg-dossier" value="${TD}"></div>
          <div><label class="fl">Table catégories</label><input class="fi" id="cfg-cat" value="${TC}"></div>
          <button class="btn btn-p" style="justify-content:center;margin-top:4px" onclick="applyConfig()">Appliquer</button>
        </div>`;
    } else {
      hint=`<code style="font-size:11px;font-family:var(--fm)">${eh(msg)}</code><br><br>
        <button class="btn btn-g" onclick="loadAll()" style="margin-top:4px">↺ Réessayer</button>`;
    }
    document.getElementById('content').innerHTML=`<div class="empty">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/></svg>
      <p>${hint}</p></div>`;
  }
}

async function applyConfig(){
  TI=document.getElementById('cfg-item')?.value?.trim()||TI;
  TD=document.getElementById('cfg-dossier')?.value?.trim()||TD;
  TC=document.getElementById('cfg-cat')?.value?.trim()||TC;
  try{ await grist.setOptions({tableItem:TI,tableDossier:TD,tableCat:TC}); }catch(_){}
  loadAll();
}

/* VIEW SWITCH */
function switchView(v){
  S.view=v; S.fType='all'; S.fDossier='all'; S.fCat='all'; S.fPrio='all';
  if(v!=='knowledge') S.expandedCat=null;
  document.querySelectorAll('.sb-item[data-view]').forEach(el=>el.classList.toggle('active',el.dataset.view===v));
  document.getElementById('tb-title').textContent={dashboard:'Dashboard',knowledge:'Connaissances',tasks:'Tâches'}[v]||v;
  renderAll();
}
function selCat(id){
  if(S.expandedCat===id){ S.expandedCat=null; }
  else { S.expandedCat=id; S.fCat=id; S.fDossier='all'; }
  if(S.view!=='knowledge'){ S.view='knowledge'; document.querySelectorAll('.sb-item[data-view]').forEach(el=>el.classList.toggle('active',el.dataset.view==='knowledge')); document.getElementById('tb-title').textContent='Connaissances'; }
  renderAll();
}
function selFolder(id){
  S.fDossier=(S.fDossier===id?'all':id);
  if(S.view!=='knowledge'){ S.view='knowledge'; document.querySelectorAll('.sb-item[data-view]').forEach(el=>el.classList.toggle('active',el.dataset.view==='knowledge')); document.getElementById('tb-title').textContent='Connaissances'; }
  renderAll();
}

/* SIDEBAR */
function makeFolderEl(d, ki){
  const itemCount=ki.filter(i=>i.dossier==d.id).length;
  const el=document.createElement('div');
  el.className='sb-subfolder'+(S.fDossier===d.id?' active':'');
  el.innerHTML=`${IC.folder}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${eh(d.nom)}</span><span style="font-size:10px;font-family:var(--fm);color:var(--t3)">${itemCount}</span>`;
  el.onclick=(e)=>{ e.stopPropagation(); selFolder(d.id); };
  return el;
}

function renderCatGroup(cat, ki, container){
  const catDossiers=S.dossiers.filter(d=>{ const c=getCat(d.categorie); return c&&c.id===cat.id; });
  const n=ki.filter(i=>{ const d=getDos(i.dossier); if(!d) return false; const c=getCat(d.categorie); return c&&c.id===cat.id; }).length;
  const isExpanded=S.expandedCat===cat.id;
  const catEl=document.createElement('div');
  catEl.className='sb-cat'+(S.fCat===cat.id?' active':'');
  // Couleur texte contrastée selon luminosité du fond
  const col=cat.couleur||'#888';
  const lum=(()=>{ const h=col.replace('#',''); const r=parseInt(h.slice(0,2),16)/255,g=parseInt(h.slice(2,4),16)/255,b=parseInt(h.slice(4,6),16)/255; return .2126*r+.7152*g+.0722*b; })();
  const txtCol=lum>0.45?'#1a1a1a':'#ffffff';
  catEl.innerHTML=`
    <span class="cat-tag" style="background:${col};color:${txtCol}">${eh(cat.nom)}</span>
    <span style="font-size:10px;font-family:var(--fm);color:var(--t3);margin-left:auto;margin-right:4px">${n}</span>
    ${catDossiers.length?`<svg class="sb-cat-chevron ${isExpanded?'open':''}" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`:''}`;
  catEl.onclick=()=>selCat(cat.id);
  container.appendChild(catEl);
  if(catDossiers.length){
    const subEl=document.createElement('div');
    subEl.className='sb-folders-sub'+(isExpanded?' open':'');
    catDossiers.forEach(d=>subEl.appendChild(makeFolderEl(d,ki)));
    container.appendChild(subEl);
  }
}

function addSbSection(container, label, buildFn){
  const div=document.createElement('div');
  div.className='sb-section';
  const lbl=document.createElement('div');
  lbl.className='sb-lbl'; lbl.textContent=label;
  div.appendChild(lbl);
  buildFn(div);
  const hr=document.createElement('hr');
  hr.className='sb-div';
  container.appendChild(hr);
  container.appendChild(div);
}

function renderSidebar(){
  const ki=S.items.filter(i=>['web','fichier','note'].includes(i.type));
  const ti=S.items.filter(i=>i.type==='action');
  document.getElementById('cnt-k').textContent=ki.length;
  document.getElementById('cnt-t').textContent=ti.filter(t=>!t.termine).length;

  const dyn=document.getElementById('sb-dynamic');
  dyn.innerHTML='';

  // Ordre des types de catégorie à afficher
  const typeOrder=['Inbox','Domaine','Ressource'];

  typeOrder.forEach(typ=>{
    const catsOfType=S.cats.filter(c=>{
      const t=String(c.type||'').trim();
      return t===typ || (typ==='Inbox'&&(c.nom==='Inbox'));
    });
    if(!catsOfType.length) return;

    // Label de section : le type lui-même (Inbox / Domaine → Domaines / Ressource → Ressources)
    const sectionLabel={'Inbox':'Inbox','Domaine':'Domaines','Ressource':'Ressources'}[typ]||typ;

    addSbSection(dyn, sectionLabel, (div)=>{
      catsOfType.forEach(cat=>renderCatGroup(cat, ki, div));
    });
  });

  // Projets : dossiers avec projet===true (indépendant des catégories)
  const projDossiers=S.dossiers.filter(d=>d.projet===true||d.projet===1);
  addSbSection(dyn, 'Projets', (div)=>{
    if(projDossiers.length){
      projDossiers.forEach(d=>div.appendChild(makeFolderEl(d,ki)));
    } else {
      const em=document.createElement('div');
      em.style.cssText='padding:4px 14px 4px 22px;font-size:11px;color:var(--t3)';
      em.textContent='Aucun projet';
      div.appendChild(em);
    }
  });
}

/* TOPBAR */
function renderTopbar(){
  const el=document.getElementById('tb-filters');
  if(S.view==='dashboard'){ el.innerHTML=''; return; }
  const searchBar=`<div class="search-wrap">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--t3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" placeholder="Rechercher…" value="${eh(S.fSearch)}" oninput="setF('fSearch',this.value)" onkeydown="if(event.key==='Escape'){setF('fSearch','');this.value=''}">
    <button id="search-clear-btn" class="search-clear" title="Effacer" style="display:${S.fSearch?'flex':'none'}" onclick="setF('fSearch','');document.getElementById('search-input').value=''"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>`;
  if(S.view==='knowledge'){
    el.innerHTML=searchBar+`
    <div class="seg">${['all','web','note'].map(t=>`<button class="seg-b ${S.fType===t?'active':''}" onclick="setF('fType','${t}')">${t==='all'?'Tout':t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</div>
    <div class="flt"><select onchange="setF('fDossier',this.value)"><option value="all">Tous les dossiers</option>${S.dossiers.map(d=>`<option value="${d.id}" ${S.fDossier==d.id?'selected':''}>${eh(d.nom)}</option>`).join('')}</select></div>
    <div class="flt"><select onchange="setF('groupBy',this.value)"><option value="dossier" ${S.groupBy==='dossier'?'selected':''}>Grouper : Dossier</option><option value="type" ${S.groupBy==='type'?'selected':''}>Grouper : Type</option><option value="categorie" ${S.groupBy==='categorie'?'selected':''}>Grouper : Catégorie</option><option value="none" ${S.groupBy==='none'?'selected':''}>Sans groupe</option></select></div>`;
  } else {
    el.innerHTML=searchBar+`
    <div class="flt"><select onchange="setF('fPrio',this.value)"><option value="all">Toutes priorités</option>${['Critique','Haute','Moyenne','Basse'].map(p=>`<option value="${p}" ${S.fPrio===p?'selected':''}>${p}</option>`).join('')}</select></div>
    <div class="flt"><select onchange="setF('fDossier',this.value)"><option value="all">Tous les dossiers</option>${S.dossiers.map(d=>`<option value="${d.id}" ${S.fDossier==d.id?'selected':''}>${eh(d.nom)}</option>`).join('')}</select></div>`;
  }
}
function setF(k,v){
  S[k]=v;
  if(k==='fSearch'){
    // Met à jour uniquement le contenu sans re-créer l'input (évite la perte de focus)
    const clr=document.getElementById('search-clear-btn');
    if(clr) clr.style.display=v?'flex':'none';
    renderContent();
  } else {
    renderAll();
  }
}
function renderContent(){
  if(!gReady) return;
  const c=document.getElementById('content');
  c.style.overflow='hidden'; c.style.padding='0';
  if(S.view==='dashboard') renderDashboard(c);
  else if(S.view==='knowledge'){ c.style.overflow='auto'; c.style.padding='20px'; renderKnowledge(c); }
  else{ c.style.overflow='auto'; c.style.padding='20px'; renderTasks(c); }
}

/* RENDER ALL */
function renderAll(){
  if(!gReady) return;
  renderSidebar(); renderTopbar(); renderContent();
}

/* DASHBOARD */
function renderDashboard(c){
  const ki=S.items.filter(i=>['web','fichier','note'].includes(i.type));
  const ti=S.items.filter(i=>i.type==='action');
  const done=ti.filter(i=>i.termine).length;
  const undone=ti.length-done;
  const crit=ti.filter(i=>i.priorite==='Critique'&&!i.termine).length;
  const pct=ti.length?Math.round(done/ti.length*100):0;
  const today=new Date().toDateString();
  const todayC=ti.filter(i=>{ if(!i.echeance||i.termine) return false; const d=new Date(typeof i.echeance==='number'?i.echeance*1000:i.echeance); return d.toDateString()===today; }).length;
  let dki=ki; if(S.dashKType!=='all') dki=ki.filter(i=>i.type===S.dashKType);
  const recentK=[...dki].reverse().slice(0,20);
  const undoneTasks=ti.filter(i=>!i.termine).sort((a,b)=>(PORD[a.priorite]??99)-(PORD[b.priorite]??99));
  c.innerHTML=`<div id="dashboard">
    <div class="dash-panel">
      <div class="panel-header">${IC.note}<span class="panel-title">Connaissances <span style="font-weight:400;color:var(--t3)">(${ki.length})</span></span>
        <div class="mini-type-tabs">${['all','web','fichier','note'].map(t=>`<span class="mtt ${S.dashKType===t?'active':''}" onclick="setDashKType('${t}')">${t==='all'?'Tout':t[0].toUpperCase()+t.slice(1)}</span>`).join('')}</div>
        <button class="ibt" onclick="openAddModal('knowledge')">${IC.plus}</button></div>
      <div class="panel-body">${recentK.length===0?`<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg><p>Aucune connaissance</p></div>`:`<table class="ktable" style="font-size:12px"><tbody>${recentK.map(i=>kRowHtml(i)).join('')}</tbody></table>`}</div>
    </div>
    <div class="dash-panel">
      <div class="panel-header">${IC.action}<span class="panel-title">Tâches <span style="font-weight:400;color:var(--t3)">(${undone} actives)</span></span>
        <button class="ibt" onclick="openAddModal('tasks')">${IC.plus}</button></div>
      <div class="panel-body">
        <div class="stats-row" style="grid-template-columns:repeat(2,1fr);margin-bottom:14px">
          <div class="stat-c"><div class="stat-v">${undone}</div><div class="stat-l">En cours</div></div>
          <div class="stat-c"><div class="stat-v" style="color:var(--crit)">${crit}</div><div class="stat-l">Critiques</div></div>
          <div class="stat-c"><div class="stat-v" style="color:var(--high)">${todayC}</div><div class="stat-l">Aujourd'hui</div></div>
          <div class="stat-c"><div class="stat-v">${pct}%</div><div class="stat-l">Terminées</div></div>
        </div>
        <div class="progress-wrap" style="margin-bottom:16px"><div class="progress-lbl"><span>${done}/${ti.length} terminées</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
        <div class="quick-add" onclick="focusQA()">${IC.plus}<input id="qa-input" placeholder="Nouvelle tâche… (Entrée)" onkeydown="qaEnter(event)"></div>
        ${undoneTasks.length===0?`<div class="empty" style="padding:30px 0"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Aucune tâche active</p></div>`:undoneTasks.map(i=>tRowHtml(i)).join('')}
      </div>
    </div>
  </div>`;
}
function setDashKType(t){ S.dashKType=t; renderAll(); }
function focusQA(){ document.getElementById('qa-input')?.focus(); }
async function qaEnter(e){
  if(e.key!=='Enter') return;
  const v=e.target.value.trim(); if(!v) return;
  try{ await grist.docApi.applyUserActions([['AddRecord',TI,null,{type:'action',nom:v,termine:false}]]); e.target.value=''; toast('Tâche ajoutée ✓'); await loadAll(); }catch(err){ console.error(err); }
}

/* KNOWLEDGE VIEW */
function renderKnowledge(c){
  let items=S.items.filter(i=>['web','fichier','note'].includes(i.type));
  if(S.fType!=='all') items=items.filter(i=>i.type===S.fType);
  if(S.fDossier!=='all') items=items.filter(i=>i.dossier==S.fDossier);
  if(S.fCat!=='all') items=items.filter(i=>{ const d=getDos(i.dossier); if(!d) return false; const ct=getCat(d.categorie); return ct&&ct.id==S.fCat; });
  if(S.fSearch){ const q=S.fSearch.toLowerCase(); items=items.filter(i=>(i.nom||'').toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q)||(i.tags||'').toLowerCase().includes(q)||(dosName(i.dossier)||'').toLowerCase().includes(q)); }
  if(items.length===0){ c.innerHTML=`<div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg><p>Aucune connaissance.<br>Cliquez sur <b>Ajouter</b>.</p></div>`; return; }
  let groups=[];
  if(S.groupBy==='dossier'){ const m={}; items.forEach(i=>{ const k=i.dossier||'__'; if(!m[k]) m[k]={label:dosName(i.dossier)||'Sans dossier',color:dosCatCol(i.dossier),items:[]}; m[k].items.push(i); }); groups=Object.values(m).sort((a,b)=>a.label.localeCompare(b.label)); }
  else if(S.groupBy==='type'){ const m={}; items.forEach(i=>{ const k=i.type||'autre'; if(!m[k]) m[k]={label:k[0].toUpperCase()+k.slice(1),color:TCOL[k]||'#666',items:[]}; m[k].items.push(i); }); groups=Object.values(m); }
  else if(S.groupBy==='categorie'){ const m={}; items.forEach(i=>{ const d=getDos(i.dossier); const ct=d?getCat(d.categorie):null; const k=ct?ct.id:'__'; if(!m[k]) m[k]={label:ct?ct.nom:'Sans catégorie',color:ct?ct.couleur:'#444',items:[]}; m[k].items.push(i); }); groups=Object.values(m).sort((a,b)=>a.label.localeCompare(b.label)); }
  else{ groups=[{label:null,color:null,items}]; }
  if(S.groupBy==='none'){
    c.innerHTML=`<table class="ktable"><tbody>${items.map(i=>kRowHtml(i)).join('')}</tbody></table>`;
  } else {
    c.innerHTML=groups.map(g=>`
      <div class="k-group">
        ${g.label!==null?`<div class="g-hdr">${g.color?`<span class="dot" style="background:${g.color}"></span>`:''}<span class="g-title">${eh(g.label)}</span><span class="g-badge">${g.items.length}</span></div>`:''}
        <table class="ktable"><tbody>${g.items.map(i=>kRowHtml(i)).join('')}</tbody></table>
      </div>`).join('');
  }
}

function kRowHtml(item){
  const dn=dosName(item.dossier);
  const tags=(item.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const hasLink=item.lien&&item.lien!=='';
  const tc={'web':'tweb','fichier':'tfich','note':'tnote'}[item.type]||'';
  const desc=item.description?eh(item.description).replace(/\n/g,' '):'';
  return `<tr class="krow" onclick="openViewer(${item.id})">
    <td class="col-type"><span class="type-pill ${tc}" title="${item.type}">${IC[item.type]||''}</span></td>
    <td class="col-name" style="font-weight:500;padding-left:4px">${eh(item.nom||'Sans titre')}${hasLink?` <a href="${ea(item.lien)}" target="_blank" onclick="event.stopPropagation()" style="color:var(--cweb);text-decoration:none;font-size:10px;margin-left:4px">↗</a>`:''}</td>
    <td class="col-dos" style="color:var(--t2);font-size:12px">${dn?eh(dn):''}</td>
    <td class="col-tags">${tags.slice(0,3).map(t=>`<span class="tag">${eh(t)}</span>`).join(' ')}</td>
    <td class="col-desc" style="color:var(--t2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0">${desc}</td>
    <td class="col-act"><div class="row-acts" style="justify-content:flex-end"><div class="ibt" onclick="event.stopPropagation();openEditModal(${item.id})" title="Modifier">${IC.edit}</div><div class="ibt" onclick="event.stopPropagation();delItem(${item.id})" title="Supprimer">${IC.trash}</div></div></td>
  </tr>`;
}

/* TASKS VIEW */
function renderTasks(c){
  let items=S.items.filter(i=>i.type==='action');
  if(S.fPrio!=='all') items=items.filter(i=>i.priorite===S.fPrio);
  if(S.fDossier!=='all') items=items.filter(i=>i.dossier==S.fDossier);
  if(S.fSearch){ const q=S.fSearch.toLowerCase(); items=items.filter(i=>(i.nom||'').toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q)); }
  const done=items.filter(i=>i.termine).length;
  const pct=items.length?Math.round(done/items.length*100):0;
  const today=new Date().toDateString();
  const tc=items.filter(i=>{ if(!i.echeance||i.termine) return false; const d=new Date(typeof i.echeance==='number'?i.echeance*1000:i.echeance); return d.toDateString()===today; }).length;
  let html=`<div class="stats-row" style="margin-bottom:20px"><div class="stat-c"><div class="stat-v">${items.length-done}</div><div class="stat-l">En cours</div></div><div class="stat-c"><div class="stat-v">${done}</div><div class="stat-l">Terminées</div></div><div class="stat-c"><div class="stat-v" style="color:var(--crit)">${items.filter(i=>i.priorite==='Critique'&&!i.termine).length}</div><div class="stat-l">Critiques</div></div><div class="stat-c"><div class="stat-v" style="color:var(--high)">${tc}</div><div class="stat-l">Aujourd'hui</div></div></div>
  <div class="progress-wrap" style="margin-bottom:20px"><div class="progress-lbl"><span>Progression</span><span>${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
  <div class="quick-add" onclick="focusQAFull()">${IC.plus}<input id="qa-full" placeholder="Nouvelle tâche… (Entrée)" onkeydown="qaEnterFull(event)"></div>`;
  if(items.length===0){ c.innerHTML=html+`<div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Aucune tâche.</p></div>`; return; }
  const undone=items.filter(i=>!i.termine).sort((a,b)=>(PORD[a.priorite]??99)-(PORD[b.priorite]??99));
  const doneItems=items.filter(i=>i.termine);
  const pg={};
  undone.forEach(i=>{ const p=i.priorite||'Basse'; if(!pg[p]) pg[p]=[]; pg[p].push(i); });
  ['Critique','Haute','Moyenne','Basse'].forEach(p=>{ if(!pg[p]?.length) return; html+=`<div class="t-section"><div class="ts-hdr"><span class="ts-title">${p}</span><span class="ts-cnt">${pg[p].length}</span></div>${pg[p].map(i=>tRowHtml(i)).join('')}</div>`; });
  if(doneItems.length) html+=`<div class="t-section"><div class="ts-hdr"><span class="ts-title">Terminées</span><span class="ts-cnt">${doneItems.length}</span></div>${doneItems.map(i=>tRowHtml(i)).join('')}</div>`;
  c.innerHTML=html;
}

function tRowHtml(item){
  const dn=dosName(item.dossier);
  const dc=dcls(item.echeance);
  return `<div class="trow" onclick="openEditModal(${item.id})">
    <div class="tchk ${item.termine?'done':''}" onclick="event.stopPropagation();toggleDone(${item.id},${!item.termine})">${item.termine?IC.check:''}</div>
    <div style="flex:1;min-width:0"><div class="tname ${item.termine?'done':''}">${eh(item.nom||'Sans titre')}</div>${dn?`<div style="font-size:10.5px;color:var(--t3)">${eh(dn)}</div>`:''}</div>
    ${item.priorite?`<span class="prio ${pcls(item.priorite)}">${item.priorite}</span>`:''}
    ${item.echeance?`<span class="tdate ${dc}">${fmtDate(item.echeance)}</span>`:''}
    <div class="t-acts"><div class="ibt" onclick="event.stopPropagation();openEditModal(${item.id})">${IC.edit}</div><div class="ibt" onclick="event.stopPropagation();delItem(${item.id})">${IC.trash}</div></div>
  </div>`;
}

function focusQAFull(){ document.getElementById('qa-full')?.focus(); }
async function qaEnterFull(e){
  if(e.key!=='Enter') return;
  const v=e.target.value.trim(); if(!v) return;
  try{ await grist.docApi.applyUserActions([['AddRecord',TI,null,{type:'action',nom:v,termine:false}]]); e.target.value=''; toast('Tâche ajoutée ✓'); await loadAll(); }catch(err){ console.error(err); }
}

/* MODAL */
function openViewer(id){
  const item=S.items.find(i=>i.id===id); if(!item) return;
  const tc={'web':'tweb','fichier':'tfich','note':'tnote'}[item.type]||'';
  const dn=dosName(item.dossier);
  const tags=(item.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const hasLink=item.lien&&item.lien!=='';
  // Header
  document.getElementById('viewer-ico').className='viewer-ico '+tc;
  document.getElementById('viewer-ico').innerHTML=IC[item.type]||'';
  document.getElementById('viewer-title').textContent=item.nom||'Sans titre';
  document.getElementById('viewer-subtitle').innerHTML=[
    dn?`<span>${IC.folder} ${eh(dn)}</span>`:'',
    `<span style="text-transform:capitalize">${item.type}</span>`
  ].filter(Boolean).join(' · ');
  // Body
  let body='';
  if(hasLink) body+=`<div><a href="${ea(item.lien)}" target="_blank" style="color:var(--cweb);font-size:12.5px;display:inline-flex;align-items:center;gap:5px;word-break:break-all">${IC.link} ${eh(item.lien)}</a></div>`;
  if(item.description) body+=`<div class="viewer-desc">${eh(item.description)}</div>`;
  if(tags.length) body+=`<div class="viewer-meta">${tags.map(t=>`<span class="viewer-badge">${eh(t)}</span>`).join('')}</div>`;
  if(!body) body=`<div style="color:var(--t3);font-size:12px;padding:8px 0">Aucun détail supplémentaire.</div>`;
  document.getElementById('viewer-body').innerHTML=body;
  // Edit button
  document.getElementById('viewer-edit-btn').onclick=()=>{ closeViewer(); openEditModal(id); };
  document.getElementById('viewer-ov').classList.add('open');
}
function closeViewer(){ document.getElementById('viewer-ov').classList.remove('open'); }
function handleViewerOvClick(e){ if(e.target===document.getElementById('viewer-ov')) closeViewer(); }

function openAddModal(forceView){
  S.modalMode='add'; S.editId=null;
  S.mType=(forceView||S.view)==='tasks'?'action':'note';
  renderModal(); document.getElementById('ov').classList.add('open');
}
function openEditModal(id){
  const item=S.items.find(i=>i.id===id); if(!item) return;
  S.modalMode='edit'; S.editId=id; S.mType=item.type||'note';
  renderModal(); document.getElementById('ov').classList.add('open');
}
function closeModal(){ document.getElementById('ov').classList.remove('open'); }
function handleOvClick(e){ if(e.target===document.getElementById('ov')) closeModal(); }
function setMType(tp){ S.mType=tp; renderModal(); }
function onModalCatChange(catId){
  // Refiltre le select dossier sans re-rendre toute la modale
  const dos=document.getElementById('f-dos'); if(!dos) return;
  const filtered=catId?S.dossiers.filter(d=>String(d.categorie)===catId):S.dossiers;
  dos.innerHTML='<option value="">— Sans dossier —</option>'+filtered.map(d=>`<option value="${d.id}">${eh(d.nom)}</option>`).join('');
}

function renderModal(){
  const isEdit=S.modalMode==='edit';
  const item=isEdit?S.items.find(i=>i.id===S.editId)||{}:{};
  const t=S.mType; const isTask=t==='action';
  document.getElementById('m-title').innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${TCOL[t]||'currentColor'}" stroke-width="2">${(IC[t]||'').replace(/<svg[^>]*>|<\/svg>/g,'')}</svg>${isEdit?'Modifier':'Ajouter'} ${isTask?'une tâche':'une connaissance'}`;
  let h='';
  if(!isTask) h+=`<div class="fg"><label class="fl">Type</label><div class="type-sel">${['note','web'].map(tp=>`<div class="topt ${t===tp?'active':''}" onclick="setMType('${tp}')">${IC[tp]} ${tp[0].toUpperCase()+tp.slice(1)}</div>`).join('')}</div></div>`;
  h+=`<div class="fg"><label class="fl">Nom *</label><input class="fi" id="f-nom" placeholder="Titre" value="${ea(item.nom||'')}"></div>`;
  if(!isTask) h+=`<div class="fg"><label class="fl">Description</label><textarea class="fta" id="f-desc" placeholder="Description…">${eh(item.description||'')}</textarea></div>`;
  if(t==='web') h+=`<div class="fg"><label class="fl">URL</label><input class="fi" id="f-lien" type="url" placeholder="https://…" value="${ea(item.lien||'')}"></div>`;
  if(isTask) h+=`<div class="frow"><div class="fg"><label class="fl">Priorité</label><select class="fs" id="f-prio">${['','Critique','Haute','Moyenne','Basse'].map(p=>`<option value="${p}" ${item.priorite===p?'selected':''}>${p||'—'}</option>`).join('')}</select></div><div class="fg"><label class="fl">Échéance</label><input class="fi" id="f-ech" type="date" value="${toDateI(item.echeance)}"></div></div><div class="fg"><label class="fl" style="display:flex;align-items:center;gap:7px;cursor:pointer"><input type="checkbox" id="f-done" ${item.termine?'checked':''} style="width:13px;height:13px;accent-color:var(--t1)"> Terminée</label></div>`;
  // Catégorie par défaut : celle du dossier existant (édition) ou Inbox (ajout)
  const inboxCatId=S.cats.find(c=>c.nom==='Inbox'||c.type==='Inbox')?.id||'';
  const inboxDosId=S.dossiers.find(d=>d.nom==='Inbox')?.id;
  let defaultCat='', defaultDos='';
  if(isEdit){
    const existDos=S.dossiers.find(d=>d.id==item.dossier);
    defaultCat=existDos?String(existDos.categorie):'';
    defaultDos=item.dossier?String(item.dossier):'';
  } else {
    defaultCat=String(inboxCatId);
    defaultDos=inboxDosId?String(inboxDosId):'';
  }
  // Dossiers filtrés selon catégorie sélectionnée
  const dosForCat=defaultCat?S.dossiers.filter(d=>String(d.categorie)===defaultCat):S.dossiers;
  h+=`<div class="fg"><label class="fl">Catégorie</label>
    <select class="fs" id="f-cat" onchange="onModalCatChange(this.value)">
      <option value="">— Toutes —</option>
      ${S.cats.map(c=>`<option value="${c.id}" ${String(c.id)===defaultCat?'selected':''}>${eh(c.nom)}</option>`).join('')}
    </select></div>`;
  h+=`<div class="fg"><label class="fl">Dossier</label>
    <select class="fs" id="f-dos">
      <option value="">— Sans dossier —</option>
      ${dosForCat.map(d=>`<option value="${d.id}" ${String(d.id)===defaultDos?'selected':''}>${eh(d.nom)}</option>`).join('')}
    </select></div>`;
  if(!isTask) h+=`<div class="fg"><label class="fl">Tags (virgule)</label><input class="fi" id="f-tags" placeholder="tag1, tag2" value="${ea(item.tags||'')}"></div>`;
  document.getElementById('m-body').innerHTML=h;
}

function toDateI(v){ if(!v) return ''; const d=new Date(typeof v==='number'?v*1000:v); return isNaN(d)?'':d.toISOString().split('T')[0]; }
function fromDateI(v){ if(!v) return null; return Math.floor(new Date(v).getTime()/1000); }

async function saveModal(){
  const nom=document.getElementById('f-nom')?.value?.trim();
  if(!nom){ alert('Le nom est requis.'); return; }
  const t=S.mType;
  const clean={type:t,nom,termine:document.getElementById('f-done')?.checked||false};
  const desc=document.getElementById('f-desc')?.value; if(desc) clean.description=desc;
  const lien=document.getElementById('f-lien')?.value; if(lien) clean.lien=lien;
  const prio=document.getElementById('f-prio')?.value; if(prio) clean.priorite=prio;
  const ech=fromDateI(document.getElementById('f-ech')?.value); if(ech) clean.echeance=ech;
  let dosVal=parseInt(document.getElementById('f-dos')?.value);
  if(!dosVal){
    // Cherche le dossier nommé "Inbox" comme fallback
    const inboxDos=S.dossiers.find(d=>d.nom==='Inbox');
    if(inboxDos) dosVal=inboxDos.id;
  }
  if(dosVal) clean.dossier=dosVal;
  const tags=document.getElementById('f-tags')?.value; if(tags) clean.tags=tags;
  try{
    if(S.modalMode==='add'){ await grist.docApi.applyUserActions([['AddRecord',TI,null,clean]]); toast('Élément ajouté ✓'); }
    else{ await grist.docApi.applyUserActions([['UpdateRecord',TI,S.editId,clean]]); toast('Modifications enregistrées ✓'); }
    closeModal(); await loadAll();
  }catch(e){ console.error(e); alert('Erreur : '+e.message); }
}

async function toggleDone(id,val){
  try{ await grist.docApi.applyUserActions([['UpdateRecord',TI,id,{termine:val}]]); toast(val?'Tâche terminée ✓':'Tâche réouverte'); await loadAll(); }catch(e){ console.error(e); }
}

async function delItem(id){
  if(!confirm('Supprimer cet élément ?')) return;
  try{ await grist.docApi.applyUserActions([['RemoveRecord',TI,id]]); toast('Supprimé'); await loadAll(); }catch(e){ console.error(e); alert('Erreur : '+e.message); }
}
</script>
